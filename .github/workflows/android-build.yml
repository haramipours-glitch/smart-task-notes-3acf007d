name: Build Android APK & AAB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Build web (Vite)
        run: npm run build
        env:
          # برای بیلد native، server.url در capacitor.config.ts را غیرفعال می‌کنیم تا اپ آفلاین کار کند
          NODE_ENV: production

      - name: Disable Capacitor dev server (for production native build)
        run: |
          node -e "
          const fs = require('fs');
          const path = 'capacitor.config.ts';
          let s = fs.readFileSync(path, 'utf8');
          // remove server: { ... } block
          s = s.replace(/server:\s*\{[\s\S]*?\},?\s*/m, '');
          fs.writeFileSync(path, s);
          console.log('Patched capacitor.config.ts for production');
          "

      - name: Add Android platform
        run: npx cap add android || echo "android already added"

      - name: Sync Capacitor with Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      - name: Build Debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (unsigned)
        working-directory: ./android
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Release AAB (unsigned)
        working-directory: ./android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: arshnaz-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: arshnaz-release-apk-unsigned
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload Release AAB (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: arshnaz-release-aab-unsigned
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
