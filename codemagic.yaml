workflows:
  android-debug-apk:
    name: Android Debug APK
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      node: 22
    scripts:
      - name: Install dependencies
        script: npm ci --legacy-peer-deps
      - name: Build web app
        script: npm run build
      - name: Sync Android
        script: npx cap sync android
      - name: Build Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
  android-release-apk:
    name: Android Release APK (Signed)
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      node: 22
    scripts:
      - name: Install dependencies
        script: npm ci --legacy-peer-deps
      - name: Build web app
        script: npm run build
      - name: Sync Android
        script: npx cap sync android
      - name: Decode keystore
        script: |
          echo "$CM_KEYSTORE" | base64 -d > android/app/release.keystore
      - name: Build Release APK
        script: |
          cd android
          chmod +x gradlew
          export KEYSTORE_PATH=app/release.keystore
          ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: $CM_KEYSTORE_PASSWORD
          KEY_ALIAS: $CM_KEY_ALIAS
          KEY_PASSWORD: $CM_KEY_PASSWORD
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
